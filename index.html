<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xsop.De | 运营商优选</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://xsop.de/uploads/default/optimized/1X/0a38ab23513b5cfeb82c04d7c4718908e69c1baf_2_32x32.gif">
    <link rel="apple-touch-icon" type="image/png" href="https://xsop.de/uploads/default/optimized/1X/0a38ab23513b5cfeb82c04d7c4718908e69c1baf_2_180x180.gif">
    <style>
        :root {
            --primary: #4776E6; --secondary: #8E54E9;
            --cu: #ff6600; /* 联通橙 */
            --ct: #005bac; /* 电信蓝 */
            --cm: #0085cf; /* 移动蓝 */
            --bg: #f8fafc; --text: #1e293b; --glass: rgba(255, 255, 255, 0.9);
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #0f172a; --text: #f1f5f9; --glass: rgba(30, 41, 59, 0.7); }
        }

        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; display: none; }

        /* 分类标题样式 */
        .isp-group { margin-top: 40px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .isp-group h2 { font-size: 1.2rem; font-weight: 800; margin: 0; }
        .isp-badge { padding: 4px 12px; border-radius: 6px; color: white; font-size: 0.75rem; font-weight: bold; }
        .bg-cu { background: var(--cu); }
        .bg-ct { background: var(--ct); }
        .bg-cm { background: var(--cm); }

        /* 表格美化 */
        .table-wrapper { background: var(--glass); border-radius: 16px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.02); padding: 12px 20px; text-align: left; font-size: 0.8rem; color: #64748b; text-transform: uppercase; }
        td { padding: 12px 20px; border-bottom: 1px solid rgba(0,0,0,0.03); font-family: monospace; }
        .ip-text { color: var(--primary); font-weight: 600; }
        .ms-text { color: #10b981; font-weight: 700; }

        /* 验证遮罩 (保持原逻辑) */
        #auth-gate { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 99; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #eee; border-radius: 10px; text-align: center; letter-spacing: 4px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-card">
            <h3>🔐 安全验证</h3>
            <input type="text" id="passInput" placeholder="输入口令">
            <button onclick="handleVerify()">确认进入</button>
        </div>
    </div>

    <div class="container" id="main-content">
        <header style="text-align:center; margin-bottom:30px;">
            <h1 style="background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">运营商优选 IP</h1>
            <p style="font-size:0.8rem; opacity:0.6;">更新时间: <span id="update-time">-</span></p>
        </header>

        <div class="isp-group"><span class="isp-badge bg-cu">CU</span><h2>中国联通</h2></div>
        <div class="table-wrapper">
            <table><thead><tr><th>IP 地址</th><th>延迟</th></tr></thead><tbody id="cu-body"></tbody></table>
        </div>

        <div class="isp-group"><span class="isp-badge bg-ct">CT</span><h2>中国电信</h2></div>
        <div class="table-wrapper">
            <table><thead><tr><th>IP 地址</th><th>延迟</th></tr></thead><tbody id="ct-body"></tbody></table>
        </div>

        <div class="isp-group"><span class="isp-badge bg-cm">CM</span><h2>中国移动</h2></div>
        <div class="table-wrapper">
            <table><thead><tr><th>IP 地址</th><th>延迟</th></tr></thead><tbody id="cm-body"></tbody></table>
        </div>
    </div>

    <script>
        const AUTH_API = "https://auth-gate.ibuy.eu.cc/?pass=";

        async function handleVerify() {
            const pwd = document.getElementById('passInput').value;
            const res = await fetch(AUTH_API + pwd);
            const json = await res.json();
            if(json.status === "ok") {
                localStorage.setItem('access_token', pwd);
                location.reload();
            } else { alert("口令错误"); }
        }

        async function loadData() {
            try {
                const response = await fetch('result.csv?t=' + Date.now());
                const csvData = await response.text();
                const rows = csvData.split('\n').slice(1).filter(r => r.trim());

                // 准备各运营商容器
                const lists = { cu: [], ct: [], cm: [] };

                rows.forEach(row => {
                    const cols = row.split(',');
                    const ip = cols[0];
                    const latency = cols[2]; // 假设延迟在第3列
                    const ispInfo = row.toLowerCase(); // 检查整行是否包含运营商关键字

                    const html = `<tr><td class="ip-text">${ip}</td><td class="ms-text">${latency} ms</td></tr>`;

                    if (ispInfo.includes("unicom") || ispInfo.includes("联通")) lists.cu.push(html);
                    else if (ispInfo.includes("telecom") || ispInfo.includes("电信")) lists.ct.push(html);
                    else if (ispInfo.includes("mobile") || ispInfo.includes("移动")) lists.cm.push(html);
                });

                document.getElementById('cu-body').innerHTML = lists.cu.join('') || '<tr><td colspan="2">暂无数据</td></tr>';
                document.getElementById('ct-body').innerHTML = lists.ct.push ? lists.ct.join('') : ''; 
                document.getElementById('ct-body').innerHTML = lists.ct.join('') || '<tr><td colspan="2">暂无数据</td></tr>';
                document.getElementById('cm-body').innerHTML = lists.cm.join('') || '<tr><td colspan="2">暂无数据</td></tr>';
                
                document.getElementById('update-time').innerText = new Date().toLocaleString();
            } catch (e) { console.error(e); }
        }

        window.onload = async () => {
            const token = localStorage.getItem('access_token');
            if (token) {
                const res = await fetch(AUTH_API + token);
                const json = await res.json();
                if(json.status === "ok") {
                    document.getElementById('auth-gate').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    loadData();
                    return;
                }
            }
            document.getElementById('auth-gate').style.display = 'flex';
        };
    </script>
</body>
</html>
