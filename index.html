<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xsop 优选节点监控</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4776E6;
            --secondary: #8E54E9;
            --success: #00c853;
            --warning: #ffab00;
            --bg: #f5f7fa;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text: #2d3436;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a2e;
                --card-bg: rgba(255, 255, 255, 0.05);
                --text: #e1e1e1;
            }
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 20% 30%, rgba(71, 118, 230, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(142, 84, 233, 0.05) 0%, transparent 40%);
            margin: 0;
            padding: 20px;
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .meta {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 状态卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover { transform: translateY(-5px); }
        .stat-card i { font-size: 1.5rem; margin-bottom: 10px; color: var(--primary); }
        .stat-val { display: block; font-size: 1.2rem; font-weight: bold; }
        .stat-label { font-size: 0.8rem; opacity: 0.7; }

        /* 表格样式 */
        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(71, 118, 230, 0.1);
            padding: 18px;
            text-align: left;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(255,255,255,0.03); }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .speed-high { color: var(--success); }
        .ping-low { background: rgba(0, 200, 83, 0.1); color: var(--success); }
        .ping-mid { background: rgba(255, 171, 0, 0.1); color: var(--warning); }

        .loading-box {
            text-align: center;
            padding: 60px;
            font-style: italic;
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            td, th { padding: 12px 8px; font-size: 0.8rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Xsop 优选节点</h1>
            <div class="meta">
                <i class="fa-regular fa-clock"></i> 刷新时间: <span id="update-time">检测中...</span>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fa-solid fa-server"></i>
                <span class="stat-val" id="node-count">-</span>
                <span class="stat-label">活跃节点总数</span>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-bolt"></i>
                <span class="stat-val" id="best-ping">-</span>
                <span class="stat-label">最优延迟 (ms)</span>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-cloud-arrow-down"></i>
                <span class="stat-val" id="best-speed">-</span>
                <span class="stat-label">最高速度 (MB/s)</span>
            </div>
        </div>

        <div class="table-container">
            <div id="loader" class="loading-box">
                <i class="fa-solid fa-spinner fa-spin"></i> 正在同步全球边缘节点数据...
            </div>
            <table id="ip-table" style="display: none;">
                <thead>
                    <tr>
                        <th><i class="fa-solid fa-network-wired"></i> 节点地址</th>
                        <th>端口</th>
                        <th>平均延迟</th>
                        <th>下行速度</th>
                    </tr>
                </thead>
                <tbody id="result-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('result.csv');
                if (!response.ok) throw new Error();
                const csvData = await response.text();
                
                const rows = csvData.split('\n').filter(row => row.trim() !== "");
                const tbody = document.getElementById('result-body');
                
                let pings = [];
                let speeds = [];

                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(',');
                    if(cols.length < 7) continue;

                    const ping = parseInt(cols[5]);
                    const speed = parseFloat(cols[6]);
                    pings.push(ping);
                    speeds.push(speed);

                    const pingClass = ping < 100 ? 'ping-low' : (ping < 180 ? 'ping-mid' : '');

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color: var(--primary); font-weight:500">${cols[0]}</td>
                        <td><span style="opacity:0.6">${cols[1]}</span></td>
                        <td><span class="badge ${pingClass}">${ping} ms</span></td>
                        <td><span class="speed-high">${speed.toFixed(2)} <small>MB/s</small></span></td>
                    `;
                    tbody.appendChild(tr);
                }

                // 更新统计数据
                document.getElementById('node-count').innerText = rows.length - 1;
                document.getElementById('best-ping').innerText = Math.min(...pings);
                document.getElementById('best-speed').innerText = Math.max(...speeds).toFixed(2);
                document.getElementById('update-time').innerText = new Date().toLocaleString();
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('ip-table').style.display = 'table';
            } catch (err) {
                document.getElementById('loader').innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> 暂时无法获取数据，请确保 GitHub Action 已成功运行并产生 result.csv`;
            }
        }
        loadData();
    </script>
</body>
</html>
