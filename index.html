<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xsop.De 优选节点</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://xsop.de/uploads/default/optimized/1X/0a38ab23513b5cfeb82c04d7c4718908e69c1baf_2_32x32.gif">
    <link rel="apple-touch-icon" type="image/png" href="https://xsop.de/uploads/default/optimized/1X/0a38ab23513b5cfeb82c04d7c4718908e69c1baf_2_180x180.gif">
    <style>
        :root { --primary: #4776E6; --secondary: #8E54E9; --success: #00c853; --warning: #ffab00; --danger: #ff5252; --bg: #f5f7fa; --card-bg: rgba(255, 255, 255, 0.9); --text: #2d3436; }
        @media (prefers-color-scheme: dark) { :root { --bg: #1a1a2e; --card-bg: rgba(255, 255, 255, 0.05); --text: #e1e1e1; } }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.2rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .meta { background: var(--card-bg); padding: 8px 20px; border-radius: 50px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.1); display: inline-block; }
        .table-container { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(71, 118, 230, 0.1); padding: 15px; text-align: left; font-size: 0.85rem; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-family: monospace; }
        .badge { padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        .loss-zero { color: var(--success); }
        .loss-warn { color: var(--warning); }
        .speed-val { color: var(--success); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" id="main-content" style="display: none;">
        <header>
            <h1>Xsop.De 优选节点</h1>
            <div class="meta"><i class="fa-regular fa-clock"></i> 更新时间: <span id="update-time">-</span></div>
        </header>
        <div class="table-container">
            <table id="ip-table">
                <thead>
                    <tr>
                        <th>节点地址</th>
                        <th>丢包率</th>
                        <th>延迟</th>
                        <th>下载速度</th>
                    </tr>
                </thead>
                <tbody id="result-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- 1. 配置区 ---
        // 记得替换为你真实的 Worker 地址
        const AUTH_API = "https://auth-gate.ibuy.eu.cc/?pass="; 
        const TG_BOT_LINK = "@nodeabot"; // 替换为你的机器人 ID

        // --- 2. 页面初始化与校验逻辑 ---
        (async function init() {
            const savedToken = localStorage.getItem('access_token');
            
            if (savedToken) {
                const ok = await verify(savedToken);
                if (ok) return loadData();
            }
            
            promptAuth();
        })();

        async function promptAuth() {
            const input = prompt(`请输入访问口令\n(请在 TG 机器人 ${TG_BOT_LINK} 获取):`);
            if (!input) {
                document.body.innerHTML = `
                    <div style='text-align:center; margin-top:100px;'>
                        <h2>⚠️ 访问被拒绝</h2>
                        <p>查看优选节点需要有效口令。</p>
                        <button onclick="location.reload()" style="padding:10px 20px; cursor:pointer;">刷新重试</button>
                    </div>`;
                return;
            }
            
            const ok = await verify(input);
            if (ok) {
                localStorage.setItem('access_token', input);
                loadData();
            } else {
                alert("口令错误或已失效！");
                promptAuth();
            }
        }

        async function verify(pwd) {
            try {
                const res = await fetch(AUTH_API + pwd);
                const json = await res.json();
                return json.status === "ok";
            } catch (e) {
                console.error("校验服务异常");
                return false;
            }
        }

        // --- 3. 数据加载与渲染逻辑 ---
        async function loadData() {
            // 校验成功后显示主容器
            document.getElementById('main-content').style.display = 'block';
            
            try {
                // 使用时间戳防止 result.csv 被浏览器缓存
                const response = await fetch('result.csv?t=' + new Date().getTime());
                const csvData = await response.text();
                const rows = csvData.split('\n').filter(row => row.trim() !== "");
                
                if (rows.length < 2) return;

                const headers = rows[0].split(',');
                const idx = {
                    ip: headers.findIndex(h => h.includes("IP") || h.includes("Address")),
                    loss: headers.findIndex(h => h.includes("丢包") || h.includes("Loss")),
                    latency: headers.findIndex(h => h.includes("延迟") || h.includes("Latency")),
                    speed: headers.findIndex(h => h.includes("速度") || h.includes("Speed"))
                };

                const tbody = document.
