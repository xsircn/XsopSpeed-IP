<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xsop.De | 优选节点监控</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://xsop.de/uploads/default/optimized/1X/0a38ab23513b5cfeb82c04d7c4718908e69c1baf_2_32x32.gif">
    <style>
        :root {
            --primary: #4776E6; --secondary: #8E54E9; --bg-body: #f8fafc;
            --text-main: #1e293b; --text-sub: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.85); --glass-border: rgba(255, 255, 255, 0.4);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #0f172a; --text-main: #f1f5f9; --text-sub: #94a3b8;
                --glass-bg: rgba(30, 41, 59, 0.7); --glass-border: rgba(255, 255, 255, 0.1);
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-body); color: var(--text-main); line-height: 1.6; }

        /* --- 验证遮罩 --- */
        #auth-gate {
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px); z-index: 9999; align-items: center; justify-content: center;
        }
        .auth-card {
            background: var(--glass-bg); padding: 40px; border-radius: 28px; width: 92%; max-width: 400px;
            text-align: center; border: 1px solid var(--glass-border);
        }

        /* --- 主体容器 --- */
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; display: none; }
        header { text-align: center; margin-bottom: 30px; }
        h1 {
            font-size: 2.4rem; font-weight: 800; margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .meta-tag {
            display: inline-flex; align-items: center; gap: 8px; background: var(--glass-bg);
            padding: 6px 15px; border-radius: 50px; font-size: 0.8rem; color: var(--text-sub); border: 1px solid var(--glass-border);
        }

        /* --- API 卡片 --- */
        .api-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .api-card {
            background: var(--glass-bg); padding: 18px; border-radius: 18px;
            border: 1px solid var(--glass-border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .api-card-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; color: var(--text-sub); }
        .api-box {
            background: rgba(0,0,0,0.05); padding: 10px 12px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center; gap: 8px;
        }
        .api-url-text { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-copy {
            background: var(--primary); color: white; border: none; padding: 5px 12px;
            border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 600;
        }

        /* --- 表格 --- */
        .table-wrapper {
            background: var(--glass-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid var(--glass-border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(71, 118, 230, 0.08); padding: 15px 20px; text-align: left; font-size: 0.8rem; color: var(--text-sub); letter-spacing: 0.05em; }
        td { padding: 14px 20px; border-bottom: 1px solid var(--glass-border); font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; }
        .ip-link { color: var(--primary); text-decoration: none; font-weight: 600; }
        .latency-val { color: #10b981; font-weight: 700; }

        input#passInput {
            width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px;
            font-size: 18px; text-align: center; letter-spacing: 4px; outline: none; margin: 20px 0;
        }
        .verify-btn {
            width: 100%; padding: 14px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="auth-gate">
        <div class="auth-card">
            <h2 style="margin-bottom: 8px;">🛡️ 内部资源保护</h2>
            <p style="color: var(--text-sub); font-size: 13px;">请在 Telegram 获取访问口令 <a href="https://t.me/nodeabot" target="_blank" style="color:var(--primary); text-decoration:none;">@nodeabot</a></p>
            <input type="text" id="passInput" placeholder="000000" maxlength="6">
            <button onclick="handleVerify()" id="verifyBtn" class="verify-btn">即刻进入</button>
        </div>
    </div>

    <div class="container" id="main-content">
        <header>
            <h1>Xsop.De 优选中心</h1>
            <div class="meta-tag"><i class="fa-regular fa-clock"></i> 更新于: <span id="update-time">-</span></div>
        </header>

        <div class="api-grid">
            <div class="api-card">
                <div class="api-card-title">官方优选 API</div>
                <div class="api-box"><span class="api-url-text" id="api-off">https://ibuy.eu.cc/api</span><button class="btn-copy" onclick="copyText('api-off')">复制</button></div>
            </div>
            <div class="api-card">
                <div class="api-card-title">聚合优选 API</div>
                <div class="api-box"><span class="api-url-text" id="api-agg">https://ibuy.eu.cc/apis</span><button class="btn-copy" onclick="copyText('api-agg')">复制</button></div>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th><i class="fa-solid fa-server"></i> 节点地址</th>
                        <th><i class="fa-solid fa-bolt"></i> 延迟 (Ping)</th>
                    </tr>
                </thead>
                <tbody id="result-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const AUTH_API = "https://auth-gate.ibuy.eu.cc/?pass=";
        const gate = document.getElementById('auth-gate'), mainContent = document.getElementById('main-content');

        window.copyText = function(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target; const old = btn.innerText;
                btn.innerText = "已复制"; btn.style.background = "#10b981";
                setTimeout(() => { btn.innerText = old; btn.style.background = ""; }, 1500);
            });
        };

        // 修改后的验证逻辑：只在点击按钮时调用后端
        window.handleVerify = async function() {
            const pwd = document.getElementById('passInput').value.trim();
            const btn = document.getElementById('verifyBtn');
            if(!pwd) return;

            btn.innerText = "校验中...";
            btn.disabled = true;

            try {
                const res = await fetch(AUTH_API + encodeURIComponent(pwd));
                const json = await res.json();
                
                if (json.status === "ok") {
                    // 验证通过，存入本地 Session (有效期12小时)
                    const session = {
                        auth: true,
                        expiry: Date.now() + (12 * 60 * 60 * 1000) 
                    };
                    localStorage.setItem('xsop_session', JSON.stringify(session));
                    showContent();
                } else {
                    alert("口令无效或已被他人使用");
                    btn.innerText = "即刻进入";
                    btn.disabled = false;
                }
            } catch (e) {
                alert("网络错误");
                btn.disabled = false;
            }
        };

        function showContent() { 
            gate.style.display = 'none'; 
            mainContent.style.display = 'block'; 
            loadData(); 
        }

        async function loadData() {
            try {
                const response = await fetch('result.csv?t=' + Date.now());
                const csvData = await response.text();
                const rows = csvData.split('\n').filter(r => r.trim() !== "");
                if (rows.length < 2) return;

                const headers = rows[0].split(',');
                const idxIp = headers.findIndex(h => h.toLowerCase().includes("ip") || h.toLowerCase().includes("address"));
                const idxLat = headers.findIndex(h => h.includes("延迟") || h.includes("Latency") || h.includes("平均延迟"));

                const tbody = document.getElementById('result-body');
                tbody.innerHTML = ''; 

                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(',');
                    if (cols.length <= Math.max(idxIp, idxLat)) continue;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><a href="#" class="ip-link">${cols[idxIp]}</a></td>
                        <td><span class="latency-val">${cols[idxLat]} ms</span></td>
                    `;
                    tbody.appendChild(tr);
                }
                document.getElementById('update-time').innerText = new Date().toLocaleString();
            } catch (e) { console.error(e); }
        }

        // 修改后的加载逻辑：只检查本地 Session
        window.addEventListener('DOMContentLoaded', () => {
            const rawSession = localStorage.getItem('xsop_session');
            if (rawSession) {
                const session = JSON.parse(rawSession);
                // 检查 Session 是否存在且未过期
                if (session.auth && Date.now() < session.expiry) {
                    showContent();
                    return;
                }
            }
            // 否则显示验证墙
            gate.style.display = 'flex';
        });
    </script>
</body>
</html>
