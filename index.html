<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xsop.De 优选节点</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://xsop.de/uploads/default/optimized/1X/0a38ab23513b5cfeb82c04d7c4718908e69c1baf_2_32x32.gif">
    <link rel="apple-touch-icon" type="image/png" href="https://xsop.de/uploads/default/optimized/1X/0a38ab23513b5cfeb82c04d7c4718908e69c1baf_2_180x180.gif">
    <style>
        :root { --primary: #4776E6; --secondary: #8E54E9; --success: #00c853; --warning: #ffab00; --danger: #ff5252; --bg: #f5f7fa; --card-bg: rgba(255, 255, 255, 0.9); --text: #2d3436; }
        @media (prefers-color-scheme: dark) { :root { --bg: #1a1a2e; --card-bg: rgba(255, 255, 255, 0.05); --text: #e1e1e1; } }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1000px; margin: 0 auto; display: none; } /* 初始隐藏 */
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.2rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .meta { background: var(--card-bg); padding: 8px 20px; border-radius: 50px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.1); display: inline-block; }
        .table-container { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(71, 118, 230, 0.1); padding: 15px; text-align: left; font-size: 0.85rem; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-family: monospace; }
        .badge { padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        .loss-zero { color: var(--success); }
        .loss-warn { color: var(--warning); }
        .speed-val { color: var(--success); font-weight: bold; }

        /* 美化遮罩层的额外样式 */
        #auth-gate {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f8fafc; z-index: 999999; align-items: center; justify-content: center;
        }
    </style>
</head>

<body>
    <div id="auth-gate">
        <div style="background: white; padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center;">
            <div style="font-size: 50px; margin-bottom: 20px;">🛡️</div>
            <h2 style="margin-bottom: 10px; color: #1e293b;">安全验证</h2>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 25px; line-height: 1.5;">
                请输入访问口令以继续<br>
                获取口令请关注：<a href="https://t.me/nodeabot" target="_blank" style="color: #3b82f6; text-decoration: none; font-weight: bold;">@nodeabot</a>
            </p>
            <input type="text" id="passInput" placeholder="请输入 6 位口令" maxlength="6" 
                style="width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 18px; text-align: center; letter-spacing: 4px; outline: none; transition: border 0.3s; color: #333;">
            <div id="errorTip" style="color: #ef4444; font-size: 13px; margin-top: 10px; display: none;">❌ 口令错误，请重新获取</div>
            <button onclick="handleVerify()" id="verifyBtn" 
                style="width: 100%; margin-top: 20px; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer;">
                确认进入
            </button>
        </div>
    </div>

    <div class="container" id="main-content">
        <header>
            <h1>Xsop.De 优选节点</h1>
            <div class="meta"><i class="fa-regular fa-clock"></i> 更新时间: <span id="update-time">-</span></div>
        </header>
        <div class="table-container">
            <table id="ip-table">
                <thead>
                    <tr>
                        <th>节点地址</th>
                        <th>丢包率</th>
                        <th>延迟</th>
                        <th>下载速度</th>
                    </tr>
                </thead>
                <tbody id="result-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- 配置区 ---
        const AUTH_API = "https://auth-gate.ibuy.eu.cc/?pass=";

        // --- 统一逻辑 ---
        const gate = document.getElementById('auth-gate');
        const mainContent = document.getElementById('main-content');
        const passInput = document.getElementById('passInput');
        const errorTip = document.getElementById('errorTip');
        const verifyBtn = document.getElementById('verifyBtn');

        // 验证请求函数
        async function checkPass(pwd) {
            if (!pwd) return false;
            try {
                const res = await fetch(AUTH_API + encodeURIComponent(pwd));
                const json = await res.json();
                return json.status === "ok";
            } catch (e) {
                console.error("验证异常", e);
                return false;
            }
        }

        // 点击按钮验证
        window.handleVerify = async function() {
            const pwd = passInput.value.trim();
            if (!pwd) return;

            verifyBtn.innerText = "正在验证...";
            verifyBtn.disabled = true;

            const isOk = await checkPass(pwd);
            if (isOk) {
                localStorage.setItem('access_token', pwd);
                showContent();
            } else {
                errorTip.style.display = 'block';
                passInput.value = '';
                verifyBtn.innerText = "确认进入";
                verifyBtn.disabled = false;
            }
        };

        // 验证通过后展示内容并加载数据
        function showContent() {
            gate.style.display = 'none';
            mainContent.style.display = 'block';
            loadData();
        }

        // 加载 CSV 数据逻辑
        async function loadData() {
            try {
                const response = await fetch('result.csv?t=' + Date.now());
                const csvData = await response.text();
                const rows = csvData.split('\n').filter(row => row.trim() !== "");
                if (rows.length < 2) return;

                const headers = rows[0].split(',');
                const idx = {
                    ip: headers.findIndex(h => h.includes("IP") || h.includes("Address")),
                    loss: headers.findIndex(h => h.includes("丢包") || h.includes("Loss")),
                    latency: headers.findIndex(h => h.includes("延迟") || h.includes("Latency")),
                    speed: headers.findIndex(h => h.includes("速度") || h.includes("Speed"))
                };

                const tbody = document.getElementById('result-body');
                tbody.innerHTML = ''; 

                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(',');
                    if (cols.length < 4) continue;
                    const loss = cols[idx.loss] || "0.00";
                    const speed = parseFloat(cols[idx.speed] || 0).toFixed(2);
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color: var(--primary)">${cols[idx.ip]}</td>
                        <td><span class="badge ${parseFloat(loss)>0?'loss-warn':'loss-zero'}">${loss}%</span></td>
                        <td><span style="opacity:0.8">${cols[idx.latency]} ms</span></td>
                        <td><span class="speed-val">${speed} MB/s</span></td>
                    `;
                    tbody.appendChild(tr);
                }
                document.getElementById('update-time').innerText = new Date().toLocaleString();
            } catch (e) {
                console.error("加载数据失败", e);
            }
        }

        // 页面启动检查
        window.addEventListener('DOMContentLoaded', async () => {
            const savedToken = localStorage.getItem('access_token');
            if (savedToken) {
                const isOk = await checkPass(savedToken);
                if (isOk) {
                    showContent();
                    return;
                }
            }
            // 没验过或失效，显示美化遮罩
            gate.style.display = 'flex';
        });

        // 支持回车
        passInput.addEventListener('keypress', e => { if(e.key === 'Enter') handleVerify(); });
    </script>
</body>
</html>
