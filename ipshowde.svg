<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="shieldGrad-ico" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#7000FF" />
    </linearGradient>
    <linearGradient id="coreGrad-ico" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#FF8C00" />
    </linearGradient>
    <filter id="glow-ico">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="coreGlow-ico">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(0, 5)">
    <path d="M 100,20 C 150,20 180,60 180,105 C 180,145 100,190 100,190 C 100,190 20,145 20,105 C 20,60 50,20 100,20 Z" fill="none" stroke="url(#shieldGrad-ico)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-ico)"/>
    
    <path d="M 100,85 L 100,20 M 100,85 L 34,120 M 100,85 L 166,120" stroke="#00F0FF" stroke-width="6" stroke-opacity="0.8" stroke-linecap="round"/>
    
    <circle cx="100" cy="20" r="8" fill="#00F0FF"/>
    <circle cx="34" cy="120" r="8" fill="#7000FF"/>
    <circle cx="166" cy="120" r="8" fill="#7000FF"/>
    
    <circle cx="100" cy="85" r="22" fill="url(#coreGrad-ico)" filter="url(#coreGlow-ico)"/>
    <circle cx="100" cy="85" r="8" fill="#FFFFFF"/>
  </g>
</svg>
