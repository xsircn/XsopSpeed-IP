name: Cloudflare Auto Speedtest

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 必须赋予写入权限，否则 Actions 机器人无法将生成的 api 文件 push 回仓库
    permissions:
      contents: write
      
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Setup CloudflareST
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest | grep "browser_download_url.*linux_amd64.tar.gz" | cut -d '"' -f 4)
          curl -L -o CloudflareST.tar.gz "$DOWNLOAD_URL"
          tar -zxf CloudflareST.tar.gz
          if [ -f "cfst" ]; then mv cfst CloudflareST; fi
          chmod +x CloudflareST

      - name: Run Speedtest and Upload to KV
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_NAMESPACE_ID: ${{ secrets.CF_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          # 1. 运行测速 (保持你原有的测速参数)
          sudo ./CloudflareST -n 500 -t 10 -p 10 -o "full_result.csv"
          
          if [ -f "full_result.csv" ]; then
              echo "=== 调试：CSV 原始表头及前 3 行 ==="
              head -n 3 full_result.csv
              echo "================================="

              # 2. 精准提取延迟数据，并强制将端口格式化为 :443
              TOP_IPS=$(awk -F',' '
              NR==1 {
                  # 在表头中自动寻找包含“延迟”或“Delay”的列
                  for(i=1; i<=NF; i++) {
                      if($i ~ /延迟/ || $i ~ /Delay/) d_col=i
                  }
                  # 如果实在没找到，默认使用第 4 列（通常是平均延迟）
                  if(!d_col) d_col=4
              }
              NR>1 && NR<=11 {
                  # 清理可能存在的空格、引号和回车符
                  gsub(/[ \t\r\"]/, "", $1)
                  gsub(/[ \t\r\"]/, "", $d_col)
                  
                  if($1 != "" && $d_col != "") {
                      print $1 ":443|" $d_col
                  }
              }' full_result.csv)
              
              echo "=== 调试：准备上传到 KV 的前 10 数据 ==="
              echo "$TOP_IPS"
              echo "========================================"
              
              if [ -z "$TOP_IPS" ]; then
                  echo "错误：提取到的数据为空，请检查 CSV 格式！"
                  exit 1
              fi
              
              # ---------------- 新增：生成根目录下的 api 文件 ----------------
              awk -F',' '
              NR>1 && NR<=11 {
                  gsub(/[ \t\r\"]/, "", $1)
                  if($1 != "") {
                      print $1 ":443#Xsop-US"
                  }
              }' full_result.csv > api

              echo "=== 调试：新生成的 api 文件内容 ==="
              cat api
              echo "=================================="
              # -----------------------------------------------------------
              
              # 3. 上传到 Cloudflare KV (键名设为 cf_top10_ips)
              echo "开始上传到 Cloudflare KV..."
              RESPONSE=$(curl -s -w "\nHTTP_CODE: %{http_code}" -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$CF_NAMESPACE_ID/values/cf_top10_ips" \
                   -H "Authorization: Bearer $CF_API_TOKEN" \
                   -H "Content-Type: text/plain" \
                   --data "$TOP_IPS")
              
              echo "=== 调试：Cloudflare API 返回结果 ==="
              echo "$RESPONSE"
              echo "====================================="
              
              # 4. 校验状态码是否为 200 成功
              if [[ "$RESPONSE" == *"HTTP_CODE: 200"* ]]; then
                  echo "🎉 KV 数据上传成功！"
              else
                  echo "❌ 错误：Cloudflare API 提交失败，请检查上方返回的报错信息！"
                  exit 1
              fi
          else
              echo "错误：未生成测速文件 full_result.csv"
              exit 1
          fi

      # ---------------- 新增：将生成的 api 文件提交并推送到 GitHub ----------------
      - name: Commit and Push API File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f "api" ]; then
            git add api
            # 检查文件内容是否有变化，有变化才提交，防止无意义的报错
            if git diff --staged --quiet; then
              echo "api 文件内容没有变化，跳过提交。"
            else
              git commit -m "chore: auto update speedtest api file [skip ci]"
              git push
            fi
          else
            echo "错误：未找到 api 文件，无法提交！"
            exit 1
          fi
