name: Cloudflare Auto Speedtest

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Setup CloudflareST
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest | grep "browser_download_url.*linux_amd64.tar.gz" | cut -d '"' -f 4)
          curl -L -o CloudflareST.tar.gz "$DOWNLOAD_URL"
          tar -zxf CloudflareST.tar.gz
          if [ -f "cfst" ]; then mv cfst CloudflareST; fi
          chmod +x CloudflareST

      - name: Run Speedtest and Upload to KV
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_NAMESPACE_ID: ${{ secrets.CF_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          # 1. 运行测速 (保持你原有的测速参数)
          sudo ./CloudflareST -n 500 -t 10 -p 10 -o "full_result.csv"
          
          if [ -f "full_result.csv" ]; then
              echo "=== 调试：CSV 原始表头及前 3 行 ==="
              head -n 3 full_result.csv
              echo "================================="

              # 2. 智能定位“端口”和“延迟”所在的列数
              PORT_COL=$(head -n 1 full_result.csv | tr ',' '\n' | grep -E -n -i "端口|Port" | cut -d':' -f1)
              DELAY_COL=$(head -n 1 full_result.csv | tr ',' '\n' | grep -E -n -i "延迟|Delay" | cut -d':' -f1)
              
              PORT_COL=${PORT_COL:-2}
              DELAY_COL=${DELAY_COL:-6}
              
              echo "定位成功 -> 端口列: $PORT_COL, 延迟列: $DELAY_COL"

              # 3. 提取延迟最低的前 10 个数据，并格式化为 IP:端口|延迟
              # 【已修正】去掉了多余的空格、中文提示和 ms 单位
              TOP_IPS=$(tr -d '\r' < full_result.csv | awk -F',' -v p="$PORT_COL" -v d="$DELAY_COL" 'NR>1 && NR<=11 {print $1 ":" $p "|" $d}')
              
              echo "=== 调试：准备上传到 KV 的前 10 数据 ==="
              echo "$TOP_IPS"
              echo "========================================"
              
              if [ -z "$TOP_IPS" ]; then
                  echo "错误：提取到的数据为空，请检查 CSV 格式！"
                  exit 1
              fi
              
              # 4. 上传到 Cloudflare KV (键名设为 cf_top10_ips)
              echo "开始上传到 Cloudflare KV..."
              RESPONSE=$(curl -s -w "\nHTTP_CODE: %{http_code}" -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$CF_NAMESPACE_ID/values/cf_top10_ips" \
                   -H "Authorization: Bearer $CF_API_TOKEN" \
                   -H "Content-Type: text/plain" \
                   --data "$TOP_IPS")
              
              echo "=== 调试：Cloudflare API 返回结果 ==="
              echo "$RESPONSE"
              echo "====================================="
              
              # 5. 校验状态码是否为 200 成功
              if [[ "$RESPONSE" == *"HTTP_CODE: 200"* ]]; then
                  echo "🎉 KV 数据上传成功！"
              else
                  echo "❌ 错误：Cloudflare API 提交失败，请检查上方返回的报错信息！"
                  exit 1
              fi
          else
              echo "错误：未生成测速文件 full_result.csv"
              exit 1
          fi
