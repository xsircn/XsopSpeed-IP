name: Auto IP Collector

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

permissions:
  contents: write

concurrency:
  group: auto-ip-collector
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 生成版本号
        run: |
          echo "UPDATE_VERSION=$(TZ=Asia/Singapore date '+%Y-%m-%d_%H:%M')" >> $GITHUB_ENV

      - name: 运行采集脚本（最多 3 次重试）
        run: |
          for i in 1 2 3; do
            python collects.py && break
            echo "Retry $i"
            sleep 5
          done

      - name: 检查文件变更
        id: changes
        run: |
          git add ipv4.txt ipv6.txt
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送更新
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Auto Update ${{ env.UPDATE_VERSION }}"
          git push

      - name: 无需提交
        if: steps.changes.outputs.changed == 'false'
        run: echo "No changes detected, skipping commit."
