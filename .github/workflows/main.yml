name: Auto IP Collector

on:
  workflow_dispatch:      # 手动触发工作流
  schedule:
    - cron: '0 */12 * * *' # 每4小时触发一次

permissions:
  contents: write        # 授权写入仓库（用于 git push）

concurrency:            # 并发控制，确保同组仅有一个实例运行
  group: auto-ip-collector
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 设置最大执行时长，防止挂起

    steps:
      - name: Checkout      # 拉取仓库代码
        uses: actions/checkout@v4  # 官方推荐使用 checkout v4 版本

      - name: Setup Python   # 设置 Python 环境
        uses: actions/setup-python@v5  # 指定 v5 版本
        with:
          python-version: "3.11"
          # 不使用 cache: pip，避免无依赖文件时报错

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate version   # 生成时间戳环境变量
        run: |
          echo "UPDATE_VERSION=$(TZ=Asia/Shanghai date '+%Y-%m-%d_%H:%M')" >> $GITHUB_ENV

      - name: Run collector
        run: |
          # 最多重试3次，捕获暂时性失败
          for i in 1 2 3; do
            python collects.py && exit 0
            echo "Retry $i..."
            sleep 5
          done
          exit 1

      - name: Check changes    # 检测文件是否有变更
        id: changes
        run: |
          git add ipv4.txt ipv6.txt
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push  # 只有有变更时才提交
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Auto Update ${UPDATE_VERSION}"
          git push

      - name: Skip commit
        if: steps.changes.outputs.changed == 'false'
        run: echo "No changes to commit."
