name: Cloudflare Auto Speedtest

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Setup CloudflareST
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest | grep "browser_download_url.*linux_amd64.tar.gz" | cut -d '"' -f 4)
          curl -L -o CloudflareST.tar.gz "$DOWNLOAD_URL"
          tar -zxf CloudflareST.tar.gz
          if [ -f "cfst" ]; then mv cfst CloudflareST; fi
          chmod +x CloudflareST

      - name: Run Speedtest and Upload to KV
      - name: Run Speedtest and Upload to KV (Debug Version)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_NAMESPACE_ID: ${{ secrets.CF_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          # 1. 运行测速
          sudo ./CloudflareST -n 500 -t 10 -p 10 -o "full_result.csv"
          
          if [ -f "full_result.csv" ]; then
              echo "=== 调试信息：CSV 文件前 3 行内容 ==="
              head -n 3 full_result.csv
              echo "====================================="

              # 2. 提取数据（这里尝试获取 IP($1)、端口($2) 和 平均延迟($6)）
              # 顺便用 tr -d '\r' 清除可能存在的 Windows 换行符，防止干扰 awk
              TOP_IPS=$(tr -d '\r' < full_result.csv | awk -F',' 'NR>1 && NR<=11 {print $1 ":" $2 " #延迟:" $6 "ms"}')
              
              echo "=== 调试信息：准备上传到 KV 的内容 ==="
              echo "$TOP_IPS"
              echo "====================================="
              
              if [ -z "$TOP_IPS" ]; then
                  echo "错误：提取到的 IP 数据为空，请检查 CSV 格式！"
                  exit 1
              fi
              
              # 3. 上传到 Cloudflare KV 并打印 API 的返回结果
              echo "开始上传到 Cloudflare KV..."
              RESPONSE=$(curl -s -w "\nHTTP_CODE: %{http_code}" -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$CF_NAMESPACE_ID/values/cf_top10_ips" \
                   -H "Authorization: Bearer $CF_API_TOKEN" \
                   -H "Content-Type: text/plain" \
                   --data "$TOP_IPS")
              
              echo "=== 调试信息：Cloudflare API 返回结果 ==="
              echo "$RESPONSE"
              echo "====================================="
              
              # 检查 HTTP 状态码是否为 200
              if [[ "$RESPONSE" == *"HTTP_CODE: 200"* ]]; then
                  echo "KV 上传成功！"
              else
                  echo "错误：Cloudflare API 提交失败！"
                  exit 1
              fi
          else
              echo "错误：未生成测速文件"
              exit 1
          fi
