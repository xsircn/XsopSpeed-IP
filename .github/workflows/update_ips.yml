name: Cloudflare Auto Speedtest

on:
  schedule:
    - cron: '0 * * * *'  # 每小时执行一次
  workflow_dispatch:      # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Setup CloudflareST
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest | grep "browser_download_url.*linux_amd64.tar.gz" | cut -d '"' -f 4)
          curl -L -o CloudflareST.tar.gz "$DOWNLOAD_URL"
          tar -zxf CloudflareST.tar.gz
          if [ -f "cfst" ]; then mv cfst CloudflareST; fi
          chmod +x CloudflareST

      - name: Run Speedtest
        run: |
          # 【修改点 1】：通过 -p 10 参数，让工具在控制台显示前 10 名
          # 虽然 -o 默认会导出所有测试通过的 IP，但我们可以通过后续脚本裁剪
          sudo ./CloudflareST -n 500 -tl 200 -sl 5 -p 10 -o "full_result.csv"
          
          # 【修改点 2】：使用 sed 命令只保留 CSV 的表头（第 1 行）和前 10 行数据（第 2 到 11 行）
          if [ -f "full_result.csv" ]; then
              sed -n '1,11p' full_result.csv > result.csv
              echo "已成功裁剪数据，仅保留前 10 组最快 IP"
          else
            echo "未能生成测速文件"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -s "result.csv" ]; then
            git add result.csv
            # 只有内容变动时才推送
            git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新优选IP (Top 10): $(date)" && git push)
          else
            echo "无有效数据"
          fi
