name: Cloudflare Auto Speedtest

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Setup CloudflareST
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest | grep "browser_download_url.*linux_amd64.tar.gz" | cut -d '"' -f 4)
          curl -L -o CloudflareST.tar.gz "$DOWNLOAD_URL"
          tar -zxf CloudflareST.tar.gz
          if [ -f "cfst" ]; then mv cfst CloudflareST; fi
          chmod +x CloudflareST

      - name: Run Speedtest and Upload to KV
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_NAMESPACE_ID: ${{ secrets.CF_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          # 1. 运行测速
          sudo ./CloudflareST -n 500 -t 10 -p 10 -o "full_result.csv"
          
          if [ -f "full_result.csv" ]; then
              # 2. 提取前10个最优IP的：IP、443端口（按你原代码硬编码443）以及平均延迟
              # CloudflareST的CSV：$1是IP，延迟通常在第6列(新版)或第4列。这里我们根据表头动态连缀，或者直接用awk处理
              # 或者是用你习惯的格式，这里提取：IP:443#延迟ms
              # 顺便处理下CFST的csv分隔符，提取前11行（1行表头+10行数据），排除表头
              
              TOP_IPS=$(awk -F',' 'NR>1 && NR<=11 {print $1 ":443 #Latency:" $(NF-1) "ms"}' full_result.csv)
              
              echo "准备上传的内容预览："
              echo "$TOP_IPS"
              
              # 3. 上传到 Cloudflare KV (键名设为 cf_top10_ips)
              echo "开始上传到 Cloudflare KV..."
              curl -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$CF_NAMESPACE_ID/values/cf_top10_ips" \
                   -H "Authorization: Bearer $CF_API_TOKEN" \
                   -H "Content-Type: text/plain" \
                   --data "$TOP_IPS"
              
              echo -e "\nKV 上传完成！"
          else
              echo "错误：未生成测速文件"
              exit 1
          fi
